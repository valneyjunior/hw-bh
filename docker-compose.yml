version: '3.9'

services:
  app:
    build: ./app
    ports:
      - "3000:80"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-bh_tecnologia}
      POSTGRES_USER: ${DB_USER:-bh_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/sql/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bh_user} -d ${DB_NAME:-bh_tecnologia}"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  pgdata:
