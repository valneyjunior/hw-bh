services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: bh_tracker
      MYSQL_USER: bh_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./app/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "bh_user", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: ./app
    restart: always
    ports:
      - "3000:80"
    environment:
      DB_HOST: db
      DB_NAME: bh_tracker
      DB_USER: bh_user
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      # E-mail (SMTP)
      APP_URL: ${APP_URL:-http://localhost:3000}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@hostweb.cloud}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-BH Tecnologia}
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
