version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: bh-pulse-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bh_pass}
      POSTGRES_DB: ${POSTGRES_DB:-bh_pulse}
    volumes:
      - bh_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bh_user} -d ${POSTGRES_DB:-bh_pulse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: bh-pulse-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - ./backend:/app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    container_name: bh-pulse-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3001"

volumes:
  bh_pg_data:
